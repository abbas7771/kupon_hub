  hostingerCoupons = STORES.hosting[0].coupons.slice();
  STORES.all[2].coupons = hostingerCoupons;
  updateUI();
  render();
});

// ============================================
// UTILITY FUNCTIONS
// ============================================

function t(key) {
  return (TRANSLATIONS[lang] && TRANSLATIONS[lang][key]) || (TRANSLATIONS['en'] && TRANSLATIONS['en'][key]) || key;
}

function initCategories() {
  const catList = document.getElementById('catList');
  const cats = ['all', 'shopping', 'travel', 'tech', 'vpn', 'fashion', 'hosting'];
  catList.innerHTML = cats.map(c => `
    <button class="cat-item ${c === cat ? 'active' : ''}" onclick="filterCategory('${c}')">${t(c)}</button>
  `).join('');
}

function updateUI() {
  document.getElementById('heroTitle').textContent = t('featured');
  document.getElementById('heroSubtitle').textContent = t('cashback');
  document.getElementById('modalTitle').textContent = t('unlockCoupon');
  document.getElementById('modalSubtitle').textContent = t('subscribe');
  document.getElementById('footer').textContent = t('copyright');
  document.getElementById('langSelect').value = lang;
  initCategories();
}

function changeLanguage(l) {
  lang = l;
  localStorage.setItem('lang', l);
  updateUI();
  render();
}

function filterCategory(c) {
  cat = c;
  store = null;
  render();
}

function backToHome() {
  store = null;
  cat = 'all';
  render();
}

function backToCategories() {
  store = null;
  render();
}

function render() {
  const mainSection = document.getElementById('mainSection');
  const detailSection = document.getElementById('storeDetailSection');
  const grid = document.getElementById('storeGrid');
  const viewTitle = document.getElementById('viewTitle');
  
  initCategories();
  
  if (store) {
    mainSection.style.display = 'none';
    detailSection.style.display = 'block';
    document.getElementById('storeDetailLogo').textContent = store.emoji;
    document.getElementById('storeDetailName').textContent = store.name;
    document.getElementById('storeDetailDesc').textContent = t('exclusive') + ' ' + store.name;
    
    let html = '';
    store.coupons.forEach(c => {
      html += `
        <div class="coupon-item">
          <div class="coupon-left">
            <div class="coupon-discount-text">UPTO</div>
            <div class="coupon-discount">${c.disc}</div>
          </div>
          <div class="coupon-middle">
            <h3 class="coupon-title">${c.title}</h3>
            <ul class="coupon-desc">
              <li>✓ ${c.desc[lang] || c.desc['en']}</li>
              <li>✓ Get exclusive code via email</li>
              <li>✓ Limited time offer</li>
            </ul>
            <div class="social-share">
              <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}" target="_blank" class="social-link" title="Facebook"><i class="fab fa-facebook"></i></a>
              <a href="https://twitter.com/intent/tweet?url=${encodeURIComponent(window.location.href)}" target="_blank" class="social-link" title="Twitter"><i class="fab fa-twitter"></i></a>
              <a href="https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(window.location.href)}" target="_blank" class="social-link" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
              <a href="https://wa.me/?text=${encodeURIComponent(store.name + ' - ' + c.title + ': ' + c.code)}" target="_blank" class="social-link" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
              <a href="https://t.me/share/url?url=${encodeURIComponent(window.location.href)}" target="_blank" class="social-link" title="Telegram"><i class="fab fa-telegram"></i></a>
            </div>
          </div>
          <div class="coupon-right">
            <div class="coupon-logo">${store.emoji}</div>
            <button class="coupon-btn" onclick="openModal('${c.code}')">${t('getCoupon')}</button>
          </div>
        </div>
      `;
    });
    document.getElementById('couponsListContainer').innerHTML = html;
  } else {
    mainSection.style.display = 'block';
    detailSection.style.display = 'none';
    viewTitle.textContent = t(cat);
    
    const stores = STORES[cat] || [];
    grid.innerHTML = stores.map(s => `
      <div class="store-card" onclick="selectStore(${s.id})">
        <div class="store-logo">${s.emoji}</div>
        <div class="store-name">${s.name}</div>
        <div class="store-count">${s.coupons.length} ${t('offers')}</div>
      </div>
    `).join('');
  }
}

function selectStore(storeId) {
  for (let category in STORES) {
    const found = STORES[category].find(s => s.id === storeId);
    if (found) {
      store = found;
      break;
    }
  }
  render();
}

function openModal(code) {
  coupon = code;
  document.getElementById('emailForm').style.display = 'block';
  document.getElementById('couponReveal').classList.remove('show');
  document.getElementById('emailInput').value = '';
  document.getElementById('emailModal').classList.add('active');
}

function handleEmailSubmit(e) {
  e.preventDefault();
  const email = document.getElementById('emailInput').value;
  const fd = new FormData();
  fd.append('Timestamp', new Date());
  fd.append('Email', email);
  fd.append('Coupon', coupon);
  
  fetch('https://docs.google.com/forms/d/e/1FAIpQLSdWxUHsSaurWmbjlUEmLpWyFijcSUJPKjTKPzFjVV61p9c2pA/formResponse', {
    method: 'POST',
    body: fd,
    mode: 'no-cors'
  });
  
  setTimeout(() => {
    document.getElementById('emailForm').style.display = 'none';
    document.getElementById('couponCode').textContent = coupon;
    document.getElementById('couponReveal').classList.add('show');
  }, 300);
}

function copyCoupon() {
  navigator.clipboard.writeText(coupon);
}

document.getElementById('emailModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('emailModal')) {
    document.getElementById('emailModal').classList.remove('active');
  }
});

// ============================================
// INITIALIZATION
// ============================================


</script>
</body>
</html>
