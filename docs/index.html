                const descs = {premium20_package: {tr: '✓ 3 sayt ✓ 25.000 ziyarətçi/ay ✓ 20GB SSD ✓ Pulsuz SSL ✓ 20% endirim', en: '✓ 3 websites ✓ 25,000 visitors/month ✓ 20GB SSD ✓ Free SSL ✓ 20% discount'}, business20_package: {tr: '✓ 50 sayt ✓ 100.000 ziyarətçi/ay ✓ 50GB NVMe ✓ Email hesapları ✓ 20% endirim', en: '✓ 50 websites ✓ 100,000 visitors/month ✓ 50GB NVMe ✓ Email accounts ✓ 20% discount'}, cloud20_package: {tr: '✓ 100 sayt ✓ 200.000 ziyarətçi/ay ✓ 100GB NVMe ✓ 4GB RAM ✓ 20% endirim', en: '✓ 100 websites ✓ 200,000 visitors/month ✓ 100GB NVMe ✓ 4GB RAM ✓ 20% discount'}};
                return (descs[c.descKey] && descs[c.descKey][lang]) ? descs[c.descKey][lang] : 'Get exclusive deal';
              })()}</li>
              <li>✓ Get exclusive code via email</li>
              <li>✓ Valid until latest deals</li>
            </ul>
            <div class="social-share">
              <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}" target="_blank" class="social-link" title="Facebook"><i class="fab fa-facebook"></i></a>
              <a href="https://twitter.com/intent/tweet?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent(shareText)}" target="_blank" class="social-link" title="Twitter"><i class="fab fa-twitter"></i></a>
              <a href="https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(window.location.href)}" target="_blank" class="social-link" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
              <a href="https://reddit.com/submit?url=${encodeURIComponent(window.location.href)}&title=${encodeURIComponent(shareText)}" target="_blank" class="social-link" title="Reddit"><i class="fab fa-reddit"></i></a>
              <a href="https://wa.me/?text=${encodeURIComponent(shareText + ' ' + window.location.href)}" target="_blank" class="social-link" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
              <a href="https://t.me/share/url?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent(shareText)}" target="_blank" class="social-link" title="Telegram"><i class="fab fa-telegram"></i></a>
            </div>
          </div>
          <div class="coupon-right">
            <div class="coupon-logo">${store.emoji}</div>
            <button class="coupon-btn" onclick="openModal('${c.code}')">${t('getCoupon')}</button>
          </div>
        </div>
      `;
    });
    document.getElementById('couponsListContainer').innerHTML = html;
  } else {
    main.style.display = 'block';
    detail.style.display = 'none';
    let stores = STORES[cat] || [];
    grid.innerHTML = stores.map(s => `
      <div class="store-card" onclick="selectStore(${s.id})">
        <div class="store-logo">${s.emoji}</div>
        <div class="store-name">${s.name}</div>
        <div class="store-count">${s.coupons.length} ${t('offers')}</div>
      </div>
    `).join('');
  }
}

function selectStore(storeId) {
  for (let category in STORES) {
    let found = STORES[category].find(s => s.id === storeId);
    if (found) { store = found; break; }
  }
  render();
}

function openModal(code) {
  coupon = code;
  document.getElementById('emailForm').style.display = 'block';
  document.getElementById('couponReveal').classList.remove('show');
  document.getElementById('emailInput').value = '';
  document.getElementById('emailModal').classList.add('active');
}

function handleEmailSubmit(e) {
  e.preventDefault();
  const email = document.getElementById('emailInput').value;
  const fd = new FormData();
  fd.append('Timestamp', new Date());
  fd.append('Email', email);
  fd.append('Coupon', coupon);
  fetch('https://docs.google.com/forms/d/e/1FAIpQLSdWxUHsSaurWmbjlUEmLpWyFijcSUJPKjTKPzFjVV61p9c2pA/formResponse', { method: 'POST', body: fd, mode: 'no-cors' });
  
  setTimeout(() => {
    document.getElementById('emailForm').style.display = 'none';
    document.getElementById('couponCode').textContent = coupon;
    document.getElementById('couponReveal').classList.add('show');
  }, 300);
}

function copyCoupon() { navigator.clipboard.writeText(coupon); }

document.getElementById('emailModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('emailModal')) document.getElementById('emailModal').classList.remove('active');
});

// Load Hostinger data
if (typeof HOSTINGER_COUPONS !== 'undefined' && HOSTINGER_COUPONS.length > 0) {
  STORES.hosting[0].coupons = HOSTINGER_COUPONS.map(c => ({...c, partner: true}));
  STORES.all = STORES.all.filter(s => s.name !== 'Hostinger');
  STORES.all.push({id: 3, name: 'Hostinger', emoji: '🌐', coupons: HOSTINGER_COUPONS.map(c => ({...c, partner: true}))});
}

document.getElementById('langSelect').value = lang;
document.querySelectorAll('.cat-item')[0].classList.add('active'); // Activate 'All' button
render();
</script>

</body>
</html>
