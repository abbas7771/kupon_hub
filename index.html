<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="KuponHub - Exclusive coupons and discounts. VidIQ 50% OFF, ElevenLabs 20% OFF, Hostinger Web Hosting 20% OFF. Get codes via email.">
  <meta name="keywords" content="coupons, discounts, deals, VidIQ, ElevenLabs, Hostinger, affiliate">
  <title>KuponHub - Deals & Coupons</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root { --primary: #003366; --secondary: #f6546a; --dark: #008080; --accent: #fff68f; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff68f; }
    
    /* Navbar */
    .navbar { background: linear-gradient(135deg, #003366, #008080); border-bottom: 2px solid #f6546a; padding: 1rem 0; }
    .navbar-brand { font-size: 1.8rem; font-weight: 900; color: #fff; cursor: pointer; }
    .nav-right { display: flex; gap: 1.5rem; align-items: center; margin-left: auto; }
    .lang-selector { background: #fff; border: none; color: #003366; padding: 0.5rem 1rem; border-radius: 6px; font-weight: 600; cursor: pointer; }
    
    /* Hero Section */
    .hero { padding: 3rem 0; background: linear-gradient(135deg, #003366, #008080); color: white; }
    .hero h1 { font-size: 2.2rem; font-weight: 900; margin-bottom: 1rem; }
    .hero p { font-size: 1.1rem; margin-bottom: 2rem; opacity: 0.95; }
    
    /* Categories */
    .categories { padding: 1.5rem 0; background: white; border-bottom: 1px solid #e9e6f9; }
    .cat-list { display: flex; gap: 1.5rem; overflow-x: auto; flex-wrap: wrap; }
    .cat-item { cursor: pointer; padding: 0.8rem 1.2rem; background: #f5f5f5; border: 2px solid transparent; border-radius: 8px; font-weight: 600; color: #666; transition: 0.2s; }
    .cat-item:hover { background: #fff68f; }
    .cat-item.active { background: #003366; color: white; border-color: #f6546a; }
    
    /* Store Grid */
    .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; }
    .store-card { background: white; border: 2px solid #e9e6f9; border-radius: 12px; padding: 2rem 1.5rem; text-align: center; cursor: pointer; transition: all 0.3s; }
    .store-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0, 51, 102, 0.2); border-color: #f6546a; }
    .store-logo { font-size: 4rem; margin-bottom: 1rem; }
    .store-name { font-size: 1.2rem; font-weight: 900; color: #111; margin-bottom: 0.5rem; }
    .store-count { font-size: 0.9rem; color: #f6546a; font-weight: 600; }
    
    /* Store Detail Header */
    .store-header { background: linear-gradient(135deg, #fff68f, #e0e0e0); padding: 3rem 2rem; margin-bottom: 2rem; border-bottom: 2px solid #008080; }
    .store-header-content { display: flex; align-items: center; gap: 3rem; }
    .store-header-logo { font-size: 6rem; min-width: 100px; }
    .store-header-info h1 { font-size: 2.5rem; font-weight: 900; color: #111; margin: 0; }
    .store-header-info p { color: #666; font-size: 1.1rem; margin: 0.5rem 0 0 0; }
    
    /* Coupon Item */
    .coupon-item { background: white; border: 2px solid #e9e6f9; border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; display: flex; gap: 1.5rem; align-items: flex-start; transition: 0.3s; }
    .coupon-item:hover { box-shadow: 0 8px 24px rgba(0, 51, 102, 0.15); }
    .coupon-left { background: linear-gradient(135deg, #003366, #008080); color: white; padding: 2rem 1.5rem; border-radius: 8px; text-align: center; min-width: 140px; flex-shrink: 0; }
    .coupon-discount-text { font-size: 0.75rem; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .coupon-discount { font-size: 2.5rem; font-weight: 900; line-height: 1; }
    .coupon-middle { flex: 1; }
    .coupon-title { font-size: 1.2rem; font-weight: 900; color: #111; margin: 0 0 1rem 0; }
    .coupon-desc { list-style: none; padding: 0; margin: 0 0 1rem 0; color: #666; font-size: 0.95rem; }
    .coupon-desc li { margin-bottom: 0.5rem; }
    .coupon-right { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
    .coupon-logo { font-size: 3rem; }
    .coupon-btn { background: #f6546a; color: white; border: none; padding: 0.9rem 1.5rem; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .coupon-btn:hover { background: #008080; }
    
    /* Social Share */
    .social-share { display: flex; gap: 0.8rem; margin-top: 1rem; border-top: 1px solid #e9e6f9; padding-top: 1rem; flex-wrap: wrap; }
    .social-link { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; background: #f5f5f5; color: #555; text-decoration: none; transition: 0.2s; }
    .social-link:hover { background: #003366; color: white; }
    
    /* Modal */
    .email-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 9999; justify-content: center; align-items: center; }
    .email-modal.active { display: flex; }
    .modal-content { background: white; border-radius: 16px; padding: 2.5rem; max-width: 450px; width: 90%; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); }
    .modal-content h2 { font-size: 1.5rem; font-weight: 900; margin-bottom: 0.5rem; color: #111; }
    .modal-content p { color: #666; margin-bottom: 1.5rem; }
    .email-input { width: 100%; padding: 0.9rem 1.2rem; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 1rem; font-size: 1rem; }
    .email-input:focus { outline: none; border-color: #003366; box-shadow: 0 0 0 3px rgba(0, 51, 102, 0.1); }
    .submit-btn { width: 100%; background: #003366; color: white; border: none; padding: 0.9rem; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 1rem; }
    .submit-btn:hover { background: #008080; }
    .coupon-reveal { background: #fff68f; padding: 1.5rem; border-radius: 8px; margin-top: 1rem; display: none; }
    .coupon-reveal.show { display: block; }
    .coupon-reveal code { display: block; background: white; padding: 1rem; border: 3px dashed #003366; border-radius: 6px; font-size: 1.3rem; font-weight: 700; color: #003366; text-align: center; margin-bottom: 1rem; }
    
    /* Sections */
    .section { padding: 2rem 0; }
    .section-title { font-size: 1.8rem; font-weight: 900; margin-bottom: 1.5rem; color: #111; }
    .back-btn { background: #f5f5f5; border: none; padding: 0.8rem 1.2rem; border-radius: 8px; cursor: pointer; font-weight: 600; margin-bottom: 1.5rem; display: none; }
    .back-btn.show { display: inline-block; }
    .back-btn:hover { background: #e0e0e0; }
    
    /* Footer */
    footer { background: #003366; color: white; padding: 2rem 0; text-align: center; margin-top: 3rem; }
    
    /* Responsive */
    @media (max-width: 768px) {
      .store-header-content { flex-direction: column; text-align: center; }
      .store-header-logo { font-size: 4rem; }
      .coupon-item { flex-direction: column; }
      .store-header-logo { min-width: auto; }
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="container-fluid px-3 px-md-5">
    <span class="navbar-brand" onclick="backToHome()" style="cursor: pointer;">🎟️ KuponHub</span>
    <div class="nav-right">
      <select class="lang-selector" id="langSelect" onchange="changeLanguage(this.value)">
        <option value="en">EN</option>
        <option value="tr">TR</option>
        <option value="ru">RU</option>
        <option value="zh">ZH</option>
        <option value="es">ES</option>
      </select>
    </div>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="container-fluid px-3 px-md-5">
    <h1 id="heroTitle">Featured daily deals and coupons</h1>
    <p id="heroSubtitle">Get cashback and extra savings on your favorite brands</p>
  </div>
</section>

<!-- Categories -->
<section class="categories">
  <div class="container-fluid px-3 px-md-5">
    <div class="cat-list" id="catList"></div>
  </div>
</section>

<!-- Main Store Grid -->
<section class="section" id="mainSection">
  <div class="container-fluid px-3 px-md-5">
    <button class="back-btn" id="backBtn" onclick="backToCategories()">← Back</button>
    <h2 class="section-title" id="viewTitle">All</h2>
    <div id="storeGrid" class="store-grid"></div>
  </div>
</section>

<!-- Store Detail -->
<section class="section" id="storeDetailSection" style="display: none;">
  <div style="background: linear-gradient(135deg, #fff68f, #e0e0e0); padding: 3rem 0; margin: -2rem 0 2rem 0;">
    <div class="container-fluid px-3 px-md-5">
      <button class="back-btn show" onclick="backToCategories()">← Back</button>
      <div class="store-header-content" style="display: flex; align-items: center; gap: 3rem;">
        <div class="store-header-logo" id="storeDetailLogo" style="font-size: 5rem; min-width: 100px;"></div>
        <div>
          <h1 id="storeDetailName" style="font-size: 2.5rem; font-weight: 900; margin: 0 0 0.5rem 0;"></h1>
          <p id="storeDetailDesc" style="color: #666; font-size: 1.1rem; margin: 0;"></p>
        </div>
      </div>
    </div>
  </div>
  <div class="container-fluid px-3 px-md-5">
    <div id="couponsListContainer"></div>
  </div>
</section>

<!-- Email Modal -->
<div id="emailModal" class="email-modal">
  <div class="modal-content">
    <h2 id="modalTitle">Unlock Coupon</h2>
    <p id="modalSubtitle">Subscribe to get the code</p>
    <form id="emailForm" onsubmit="handleEmailSubmit(event)">
      <input type="email" class="email-input" id="emailInput" placeholder="Your email..." required>
      <button type="submit" class="submit-btn">Get Code</button>
    </form>
    <div id="couponReveal" class="coupon-reveal">
      <p style="color: #666; margin-bottom: 0.5rem;">Your code:</p>
      <code id="couponCode"></code>
      <button onclick="copyCoupon()" class="coupon-btn" style="width: 100%;">Copy</button>
    </div>
  </div>
</div>

<!-- Footer -->
<footer id="footer">© 2026 KuponHub</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ============================================
// DATA & STATE
// ============================================

const TRANSLATIONS = {
  en: { featured: 'Featured daily deals and coupons', cashback: 'Get cashback and extra savings on your favorite brands', all: 'All', shopping: 'Shopping', travel: 'Travel', tech: 'Tech', vpn: 'VPN', fashion: 'Fashion', hosting: 'Hosting', offers: 'offers', exclusive: 'Exclusive deals and coupons for', getCoupon: 'Get Coupon', unlockCoupon: 'Unlock Coupon', subscribe: 'Subscribe to get the code', yourCode: 'Your code:', copy: 'Copy', copyright: '© 2026 KuponHub' },
  tr: { featured: 'Günlük fırsatlar ve kuponlar', cashback: 'Favori markalarda geri ödeme ve ekstra tasarruf alın', all: 'Tümü', shopping: 'Alışveriş', travel: 'Seyahat', tech: 'Teknoloji', vpn: 'VPN', fashion: 'Moda', hosting: 'Hosting', offers: 'teklif', exclusive: 'Özel fırsatlar ve kuponlar', getCoupon: 'Kuponu Al', unlockCoupon: 'Kuponu Açın', subscribe: 'Kodu almak için abone olun', yourCode: 'Sizin kodunuz:', copy: 'Kopyala', copyright: '© 2026 KuponHub' },
  ru: { featured: 'Ежедневные предложения и купоны', cashback: 'Получите кэшбэк и дополнительную экономию на ваши любимые бренды', all: 'Все', shopping: 'Покупки', travel: 'Путешествия', tech: 'Технология', vpn: 'VPN', fashion: 'Мода', hosting: 'Хостинг', offers: 'предложения', exclusive: 'Эксклюзивные предложения и купоны', getCoupon: 'Получить купон', unlockCoupon: 'Разблокировать купон', subscribe: 'Подпишитесь, чтобы получить код', yourCode: 'Ваш код:', copy: 'Копировать', copyright: '© 2026 KuponHub' },
  zh: { featured: '每日特惠和优惠券', cashback: '在您最喜欢的品牌上获得现金返还和额外节省', all: '全部', shopping: '购物', travel: '旅行', tech: '科技', vpn: 'VPN', fashion: '时尚', hosting: '托管', offers: '优惠', exclusive: '独家优惠和优惠券', getCoupon: '获取优惠券', unlockCoupon: '解锁优惠券', subscribe: '订阅以获取代码', yourCode: '您的代码:', copy: '复制', copyright: '© 2026 KuponHub' },
  es: { featured: 'Ofertas y cupones diarios destacados', cashback: 'Obtenga reembolso y ahorros adicionales en sus marcas favoritas', all: 'Todos', shopping: 'Compras', travel: 'Viajes', tech: 'Tecnología', vpn: 'VPN', fashion: 'Moda', hosting: 'Alojamiento', offers: 'ofertas', exclusive: 'Ofertas y cupones exclusivos para', getCoupon: 'Obtener Cupón', unlockCoupon: 'Desbloquear Cupón', subscribe: 'Suscríbete para obtener el código', yourCode: 'Tu código:', copy: 'Copiar', copyright: '© 2026 KuponHub' }
};

const STORES = {
  all: [
    { id: 1, name: 'VidIQ', emoji: '🎥', coupons: [{ code: 'VIDIQ50', disc: '50%', title: 'YouTube Analytics Pro', desc: { en: '50% off YouTube analytics tools', tr: 'YouTube analitik araçlarında %50 indirim' } }] },
    { id: 2, name: 'ElevenLabs', emoji: '🎙️', coupons: [{ code: 'EL20', disc: '20%', title: 'AI Voice Generation', desc: { en: '20% off AI text-to-speech', tr: 'AI metin-konuşmada %20 indirim' } }] },
    { id: 3, name: 'Hostinger', emoji: '🌐', coupons: [{ code: 'KUPONHUB20', disc: '20%', title: 'Web Hosting', desc: { en: '20% off web hosting', tr: 'Web hosting-de %20 indirim' } }] }
  ],
  shopping: [
    { id: 1, name: 'VidIQ', emoji: '🎥', coupons: [{ code: 'VIDIQ50', disc: '50%', title: 'YouTube Analytics Pro', desc: { en: '50% off YouTube analytics tools', tr: 'YouTube analitik araçlarında %50 indirim' } }] }
  ],
  travel: [],
  tech: [
    { id: 1, name: 'VidIQ', emoji: '🎥', coupons: [{ code: 'VIDIQ50', disc: '50%', title: 'YouTube Analytics Pro', desc: { en: '50% off YouTube analytics tools', tr: 'YouTube analitik araçlarında %50 indirim' } }] },
    { id: 2, name: 'ElevenLabs', emoji: '🎙️', coupons: [{ code: 'EL20', disc: '20%', title: 'AI Voice Generation', desc: { en: '20% off AI text-to-speech', tr: 'AI metin-konuşmada %20 indirim' } }] }
  ],
  vpn: [],
  fashion: [],
  hosting: [
    { id: 3, name: 'Hostinger', emoji: '🌐', coupons: [
      { code: 'PREMIUM20', disc: '20%', title: 'Premium Web Hosting', desc: { en: '3 websites, 25k visitors/mo', tr: '3 sayt, 25.000 ziyarətçi/ay' } },
      { code: 'BUSINESS20', disc: '20%', title: 'Business Web Hosting', desc: { en: '50 websites, 100k visitors/mo', tr: '50 sayt, 100.000 ziyarətçi/ay' } },
      { code: 'CLOUD20', disc: '20%', title: 'Cloud Startup', desc: { en: '100 websites, 200k visitors/mo', tr: '100 sayt, 200.000 ziyarətçi/ay' } }
    ] }
  ]
};

let lang = localStorage.getItem('lang') || 'en';
let cat = 'all';
let store = null;
let coupon = null;

// ============================================
// UTILITY FUNCTIONS
// ============================================

function t(key) {
  return (TRANSLATIONS[lang] && TRANSLATIONS[lang][key]) || (TRANSLATIONS['en'] && TRANSLATIONS['en'][key]) || key;
}

function initCategories() {
  const catList = document.getElementById('catList');
  const cats = ['all', 'shopping', 'travel', 'tech', 'vpn', 'fashion', 'hosting'];
  catList.innerHTML = cats.map(c => `
    <button class="cat-item ${c === cat ? 'active' : ''}" onclick="filterCategory('${c}')">${t(c)}</button>
  `).join('');
}

function updateUI() {
  document.getElementById('heroTitle').textContent = t('featured');
  document.getElementById('heroSubtitle').textContent = t('cashback');
  document.getElementById('modalTitle').textContent = t('unlockCoupon');
  document.getElementById('modalSubtitle').textContent = t('subscribe');
  document.getElementById('footer').textContent = t('copyright');
  document.getElementById('langSelect').value = lang;
  initCategories();
}

function changeLanguage(l) {
  lang = l;
  localStorage.setItem('lang', l);
  updateUI();
  render();
}

function filterCategory(c) {
  cat = c;
  store = null;
  render();
}

function backToHome() {
  store = null;
  cat = 'all';
  render();
}

function backToCategories() {
  store = null;
  render();
}

function render() {
  const mainSection = document.getElementById('mainSection');
  const detailSection = document.getElementById('storeDetailSection');
  const grid = document.getElementById('storeGrid');
  const viewTitle = document.getElementById('viewTitle');
  
  initCategories();
  
  if (store) {
    mainSection.style.display = 'none';
    detailSection.style.display = 'block';
    document.getElementById('storeDetailLogo').textContent = store.emoji;
    document.getElementById('storeDetailName').textContent = store.name;
    document.getElementById('storeDetailDesc').textContent = t('exclusive') + ' ' + store.name;
    
    let html = '';
    store.coupons.forEach(c => {
      html += `
        <div class="coupon-item">
          <div class="coupon-left">
            <div class="coupon-discount-text">UPTO</div>
            <div class="coupon-discount">${c.disc}</div>
          </div>
          <div class="coupon-middle">
            <h3 class="coupon-title">${c.title}</h3>
            <ul class="coupon-desc">
              <li>✓ ${c.desc[lang] || c.desc['en']}</li>
              <li>✓ Get exclusive code via email</li>
              <li>✓ Limited time offer</li>
            </ul>
            <div class="social-share">
              <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}" target="_blank" class="social-link" title="Facebook"><i class="fab fa-facebook"></i></a>
              <a href="https://twitter.com/intent/tweet?url=${encodeURIComponent(window.location.href)}" target="_blank" class="social-link" title="Twitter"><i class="fab fa-twitter"></i></a>
              <a href="https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(window.location.href)}" target="_blank" class="social-link" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
              <a href="https://wa.me/?text=${encodeURIComponent(store.name + ' - ' + c.title + ': ' + c.code)}" target="_blank" class="social-link" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
              <a href="https://t.me/share/url?url=${encodeURIComponent(window.location.href)}" target="_blank" class="social-link" title="Telegram"><i class="fab fa-telegram"></i></a>
            </div>
          </div>
          <div class="coupon-right">
            <div class="coupon-logo">${store.emoji}</div>
            <button class="coupon-btn" onclick="openModal('${c.code}')">${t('getCoupon')}</button>
          </div>
        </div>
      `;
    });
    document.getElementById('couponsListContainer').innerHTML = html;
  } else {
    mainSection.style.display = 'block';
    detailSection.style.display = 'none';
    viewTitle.textContent = t(cat);
    
    const stores = STORES[cat] || [];
    grid.innerHTML = stores.map(s => `
      <div class="store-card" onclick="selectStore(${s.id})">
        <div class="store-logo">${s.emoji}</div>
        <div class="store-name">${s.name}</div>
        <div class="store-count">${s.coupons.length} ${t('offers')}</div>
      </div>
    `).join('');
  }
}

function selectStore(storeId) {
  for (let category in STORES) {
    const found = STORES[category].find(s => s.id === storeId);
    if (found) {
      store = found;
      break;
    }
  }
  render();
}

function openModal(code) {
  coupon = code;
  document.getElementById('emailForm').style.display = 'block';
  document.getElementById('couponReveal').classList.remove('show');
  document.getElementById('emailInput').value = '';
  document.getElementById('emailModal').classList.add('active');
}

function handleEmailSubmit(e) {
  e.preventDefault();
  const email = document.getElementById('emailInput').value;
  const fd = new FormData();
  fd.append('Timestamp', new Date());
  fd.append('Email', email);
  fd.append('Coupon', coupon);
  
  fetch('https://docs.google.com/forms/d/e/1FAIpQLSdWxUHsSaurWmbjlUEmLpWyFijcSUJPKjTKPzFjVV61p9c2pA/formResponse', {
    method: 'POST',
    body: fd,
    mode: 'no-cors'
  });
  
  setTimeout(() => {
    document.getElementById('emailForm').style.display = 'none';
    document.getElementById('couponCode').textContent = coupon;
    document.getElementById('couponReveal').classList.add('show');
  }, 300);
}

function copyCoupon() {
  navigator.clipboard.writeText(coupon);
}

document.getElementById('emailModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('emailModal')) {
    document.getElementById('emailModal').classList.remove('active');
  }
});

// ============================================
// INITIALIZATION
// ============================================

document.addEventListener('DOMContentLoaded', () => {
  updateUI();
  render();
});
</script>
</body>
</html>
