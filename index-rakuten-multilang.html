<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #7C3AED;
      --secondary: #4F46E5;
      --light-bg: #f9f7ff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fff; }

    .navbar {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      box-shadow: 0 2px 10px rgba(124, 58, 237, 0.15);
      padding: 1rem 0;
    }
    .navbar-brand { font-size: 1.5rem; font-weight: 800; color: #fff; }
    .nav-link { color: rgba(255,255,255,0.8) !important; transition: 0.2s; }
    .nav-link:hover { color: #fff !important; }
    .lang-selector {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      margin-left: auto;
    }
    .lang-selector:hover { background: rgba(255,255,255,0.3); }

    .search-section { background: linear-gradient(160deg, var(--primary) 0%, var(--secondary) 100%); padding: 3rem 0; color: #fff; }
    .search-input { border: none; padding: 12px 20px; border-radius: 999px; font-size: 0.95rem; }

    .category-pills { display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 1rem; margin-top: 1.5rem; }
    .category-pill {
      background: var(--light-bg);
      border: 2px solid #e0e0e0;
      border-radius: 999px;
      padding: 0.6rem 1.5rem;
      cursor: pointer;
      white-space: nowrap;
      font-weight: 600;
      transition: 0.2s;
      color: #333;
    }
    .category-pill:hover { border-color: var(--primary); color: var(--primary); }
    .category-pill.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    .coupon-card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      border: 1px solid #e9e6f9;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .coupon-card:hover { transform: translateY(-6px); box-shadow: 0 12px 28px rgba(124, 58, 237, 0.15); }

    .card-image {
      width: 100%;
      height: 180px;
      background: linear-gradient(135deg, var(--light-bg) 0%, #f0f0f0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      position: relative;
    }

    .card-body { flex: 1; padding: 1.5rem; display: flex; flex-direction: column; }
    .card-badge {
      background: var(--primary);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      display: inline-block;
      margin-bottom: 0.5rem;
      width: fit-content;
    }
    .card-title { font-size: 1.1rem; font-weight: 800; color: #111; margin-bottom: 0.3rem; }
    .card-description { font-size: 0.9rem; color: #555; line-height: 1.5; margin-bottom: 1rem; }

    .code-section {
      background: var(--light-bg);
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
    }
    .code-label { font-size: 0.75rem; color: #999; text-transform: uppercase; margin-bottom: 0.3rem; }
    .code-box {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #fff;
      border: 1px dashed var(--primary);
      padding: 0.8rem;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-weight: 700;
      color: var(--primary);
      font-size: 0.85rem;
    }
    .copy-btn {
      background: none;
      border: none;
      color: var(--primary);
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-deal {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: #fff;
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: 8px;
      font-weight: 700;
      width: 100%;
      transition: 0.2s;
      cursor: pointer;
    }
    .btn-deal:hover { opacity: 0.9; }

    .section-title { font-size: 2rem; font-weight: 800; color: #111; margin-bottom: 2rem; margin-top: 3rem; }

    .filter-bar {
      background: var(--light-bg);
      padding: 1.5rem;
      border-radius: 12px;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    footer { background: #f5f5f5; padding: 2rem 0; color: #666; text-align: center; margin-top: 4rem; }

    @media (max-width: 768px) {
      .section-title { font-size: 1.5rem; }
      .category-pills { gap: 0.5rem; }
      .category-pill { padding: 0.5rem 1rem; font-size: 0.85rem; }
    }
  </style>
</head>

let currentLang = 'en';
let currentCategory = 'all';

function t(key) {
  return TRANSLATIONS[currentLang]?.[key] || TRANSLATIONS['en'][key];
}

function changeLanguage(lang) {
  currentLang = lang;
  localStorage.setItem('language', lang);
  document.documentElement.lang = lang;
  
  document.querySelectorAll('[data-en]').forEach(el => {
    el.textContent = el.getAttribute(`data-${lang}`) || el.getAttribute('data-en');
  });
  
  renderCoupons();
  renderReferrals();
}

function renderCoupons() {
  const grid = document.getElementById('couponGrid');
  let filtered = COUPONS.filter(c => currentCategory === 'all' || c.category === currentCategory);

  grid.innerHTML = filtered.map(c => `
    <div class="col-md-6 col-lg-4">
      <div class="coupon-card">
        <div class="card-image">${c.emoji}</div>
        <div class="card-body">
          <span class="card-badge">${c.discount}</span>
          <h5 class="card-title">${c.name}</h5>
          <p class="card-description">${typeof c.desc === 'object' ? (c.desc[currentLang] || c.desc.en) : c.desc}</p>
          <div class="code-section">
            <div class="code-label">${t('code')}</div>
            <div class="code-box">

}

function copyCode(code) {
  navigator.clipboard.writeText(code);
  alert(`"${code}" copied!`);
}

function filterCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active'));
  event.target.closest('.category-pill').classList.add('active');
  renderCoupons();
}

  const grid = document.getElementById('couponGrid');

    c.code.toLowerCase().includes(query)

          <h5 class="card-title">${c.name}</h5>
          <p class="card-description">${typeof c.desc === 'object' ? (c.desc[currentLang] || c.desc.en) : c.desc}</p>
          <div class="code-section">
            <div class="code-label">${t('code')}</div>
            <div class="code-box">
              <span>${c.code}</span>
              <button class="copy-btn" onclick="copyCode('${c.code}')"><i class="fas fa-copy"></i></button>
            </div>
          </div>
          <button class="btn-deal" onclick="window.open('${c.link}')">${t('dealBtn')}</button>
        </div>
      </div>
    </div>
  `).join('');
});

const savedLang = localStorage.getItem('language') || 'en';
document.getElementById('langSelect').value = savedLang;
changeLanguage(savedLang);
