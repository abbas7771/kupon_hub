<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KuponHub - Deals & Coupons</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root { --primary: #7C3AED; --secondary: #4F46E5; --light-bg: #f9f7ff; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; }
    .navbar { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 1rem 0; }
    .navbar-brand { font-size: 1.8rem; font-weight: 900; color: var(--primary); }
    .nav-right { display: flex; align-items: center; gap: 1.5rem; margin-left: auto; }
    .lang-selector { background: #f5f5f5; border: 1px solid #e0e0e0; color: #333; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; }
    .hero { padding: 2rem 0; }
    .hero h1 { font-size: 2.2rem; font-weight: 900; color: #111; }
    .search-box { display: flex; gap: 0.5rem; max-width: 600px; }
    .search-box input { flex: 1; padding: 0.9rem 1.2rem; border: 1px solid #ddd; border-radius: 8px; }
    .search-box button { background: var(--primary); color: #fff; border: none; padding: 0.9rem 1.5rem; border-radius: 8px; font-weight: 700; cursor: pointer; }
    .categories { padding: 1.5rem 0; border-bottom: 1px solid #f0f0f0; }
    .cat-list { display: flex; gap: 1.5rem; overflow-x: auto; }
    .cat-item { cursor: pointer; color: #666; text-decoration: none; font-weight: 500; white-space: nowrap; }
    .cat-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
    .store-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
    .store-card { background: #fff; border-radius: 12px; border: 1px solid #e9e6f9; padding: 1.5rem; text-align: center; cursor: pointer; transition: all 0.3s; }
    .store-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(124,58,237,0.15); }
    .store-logo { font-size: 3rem; margin-bottom: 1rem; }
    .store-name { font-size: 1.1rem; font-weight: 800; color: #111; margin-bottom: 0.5rem; }
    .store-count { font-size: 0.85rem; color: #999; }
    .coupon-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
    .coupon-card { background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #e9e6f9; display: flex; flex-direction: column; cursor: pointer; transition: all 0.3s; position: relative; }
    .coupon-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(124,58,237,0.15); }
    .coupon-card.partner-card { aspect-ratio: 1; }
    .card-image-container { width: 100%; height: 180px; background: linear-gradient(135deg, #e8f3ff, #f5f0ff); display: flex; align-items: center; justify-content: center; font-size: 3rem; }
    .card-content { padding: 1.2rem; flex: 1; }
    .card-title { font-size: 0.95rem; font-weight: 800; color: #111; }
    .code-badge { background: var(--light-bg); border: 1px dashed var(--primary); padding: 0.7rem; border-radius: 6px; margin: 0.8rem 0; cursor: pointer; }
    .btn-deal { background: var(--primary); color: #fff; border: none; padding: 0.7rem 1.2rem; border-radius: 6px; font-weight: 700; width: 100%; cursor: pointer; margin-bottom: 0.8rem; }
    .btn-deal:hover { background: var(--secondary); }
    .social-share { display: flex; gap: 0.8rem; padding-top: 1rem; border-top: 1px solid #e9e6f9; }
    .social-link { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; background: #f5f5f5; color: #555; text-decoration: none; transition: 0.2s; }
    .social-link:hover { background: var(--primary); color: #fff; }
    .discount-badge { position: absolute; top: -12px; right: 8px; background: linear-gradient(135deg, #FF6B6B, #FF5252); color: white; padding: 0.8rem 1.2rem; border-radius: 8px; font-weight: 900; font-size: 1.4rem; z-index: 20; box-shadow: 0 4px 12px rgba(255,107,107,0.4); border: 3px solid white; }
    .partner-content { width: 100%; height: 100%; background-size: cover; background-position: center; display: flex; align-items: flex-end; padding: 1.5rem; color: white; }
    .email-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center; }
    .email-modal.active { display: flex; }
    .modal-content { background: #fff; border-radius: 16px; padding: 2rem; max-width: 500px; width: 90%; }
    .email-input { padding: 0.9rem 1.2rem; border: 1px solid #ddd; border-radius: 8px; width: 100%; margin-bottom: 1rem; }
    .submit-btn { background: var(--primary); color: #fff; border: none; padding: 0.9rem 1.5rem; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; }
    .coupon-reveal { background: var(--light-bg); padding: 1rem; border-radius: 8px; margin-top: 1rem; display: none; }
    .coupon-reveal.show { display: block; }
    .coupon-reveal code { display: block; background: #fff; padding: 1rem; border: 2px dashed var(--primary); border-radius: 6px; font-size: 1.1rem; font-weight: 700; color: var(--primary); text-align: center; }
    .back-btn { background: #f5f5f5; border: none; padding: 0.8rem 1.2rem; border-radius: 8px; cursor: pointer; font-weight: 600; margin-bottom: 1.5rem; display: none; }
    .back-btn.show { display: inline-block; }
    .back-btn:hover { background: #e0e0e0; }
    .section-title { font-size: 1.8rem; font-weight: 900; margin-bottom: 1.5rem; }
    footer { background: #f5f5f5; padding: 2rem 0; text-align: center; margin-top: 3rem; }
    @media (max-width: 1024px) { .store-grid { grid-template-columns: repeat(3, 1fr); } .coupon-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 768px) { .store-grid { grid-template-columns: repeat(2, 1fr); } .coupon-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .store-grid { grid-template-columns: 1fr; } .coupon-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container-fluid px-3 px-md-5">
    <span class="navbar-brand">🎟️ KuponHub</span>
    <div class="nav-right">
      <select class="lang-selector" id="langSelect" onchange="changeLanguage(this.value)">
        <option value="en">EN</option>
        <option value="az">AZ</option>
        <option value="tr">TR</option>
        <option value="ru">RU</option>
        <option value="zh">ZH</option>
        <option value="es">ES</option>
      </select>
    </div>
  </div>
</nav>

<section class="hero">
  <div class="container-fluid px-3 px-md-5">
    <h1>Featured daily deals and coupons</h1>
    <p>Get cashback and extra savings on your favorite brands</p>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search stores...">
      <button onclick="doSearch()">Search</button>
    </div>
  </div>
</section>

<section class="categories">
  <div class="container-fluid px-3 px-md-5">
    <div class="cat-list">
      <a class="cat-item active" onclick="filterCategory('all')">All</a>
      <a class="cat-item" onclick="filterCategory('shopping')">Shopping</a>
      <a class="cat-item" onclick="filterCategory('travel')">Travel</a>
      <a class="cat-item" onclick="filterCategory('tech')">Tech</a>
      <a class="cat-item" onclick="filterCategory('vpn')">VPN</a>
      <a class="cat-item" onclick="filterCategory('fashion')">Fashion</a>
      <a class="cat-item" onclick="filterCategory('hosting')">Hosting</a>
    </div>
  </div>
</section>

<section style="padding: 2rem 0;">
  <div class="container-fluid px-3 px-md-5">
    <button class="back-btn" onclick="backToCategories()">← Back to Categories</button>
    <h2 class="section-title" id="viewTitle">Stores & Coupons</h2>
    <div id="storeGrid" class="store-grid"></div>
    <div id="couponGrid" class="coupon-grid"></div>
  </div>
</section>

<div id="emailModal" class="email-modal">
  <div class="modal-content">
    <h2 style="font-size: 1.5rem; font-weight: 900; margin-bottom: 1rem;">Unlock Coupon</h2>
    <p style="color: #666; margin-bottom: 1.5rem;">Subscribe to get the code</p>
    <form id="emailForm" onsubmit="handleEmailSubmit(event)" style="display: none;">
      <input type="email" class="email-input" id="emailInput" placeholder="Your email..." required>
      <button type="submit" class="submit-btn">Get Code</button>
    </form>
    <div id="couponReveal" class="coupon-reveal">
      <p style="color: #666; font-size: 0.85rem; margin-bottom: 0.5rem;">Your code:</p>
      <code id="couponCode"></code>
      <button onclick="copyCoupon()" class="btn-deal">Copy</button>
    </div>
  </div>
</div>

<footer>© 2026 KuponHub</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const STORES = {
  shopping: [
    { id: 1, name: 'TrendyOL', emoji: '🛍️', coupons: [] },
    { id: 2, name: 'Amazon', emoji: '📦', coupons: [] }
  ],
  tech: [
    { id: 3, name: 'VidIQ', emoji: '🎥', coupons: [
      { id: 1, code: 'VIDIQ50', disc: '50%', desc: 'YouTube tools', link: 'https://vidiq.com/kuponhub', partner: true }
    ]},
    { id: 4, name: 'ElevenLabs', emoji: '🎙️', coupons: [
      { id: 2, code: 'EL20', disc: '20%', desc: 'AI voice', link: 'https://try.elevenlabs.io/ei50op7ldiit', partner: true }
    ]}
  ],
  hosting: [
    { id: 5, name: 'Hostinger', emoji: '🌐', coupons: [
      { id: 3, code: 'KUPONHUB20', disc: '20%', desc: 'Web hosting', link: 'https://www.hostinger.com/cart?product=hosting%3Ahostinger_premium&period=12&referral_type=cart_link&REFERRALCODE=EYNNIHATAFIC&referral_id=019d5f46-87b6-713f-985a-bf392b521ffd', partner: true }
    ]}
  ]
};

let lang = 'en', cat = 'all', store = null, coupon = null;

function changeLanguage(l) { lang = l; localStorage.setItem('lang', l); render(); }
function filterCategory(c) { cat = c; store = null; document.querySelectorAll('.cat-item').forEach(e => e.classList.remove('active')); event.target.classList.add('active'); render(); }
function backToCategories() { store = null; render(); }

function render() {
  const back = document.querySelector('.back-btn');
  const title = document.getElementById('viewTitle');
  const storeGrid = document.getElementById('storeGrid');
  const couponGrid = document.getElementById('couponGrid');

  if (store) {
    back.classList.add('show');
    title.textContent = store.name + ' - Coupons';
    storeGrid.innerHTML = '';
    couponGrid.innerHTML = store.coupons.map(c => renderCoupon(c)).join('');
  } else {
    back.classList.remove('show');
    title.textContent = cat.charAt(0).toUpperCase() + cat.slice(1) + ' - Stores';
    couponGrid.innerHTML = '';
    storeGrid.innerHTML = (STORES[cat] || []).map(s => `
      <div class="store-card" onclick="selectStore('${cat}', ${s.id})">
        <div class="store-logo">${s.emoji}</div>
        <div class="store-name">${s.name}</div>
        <div class="store-count">${s.coupons.length} offers</div>
      </div>
    `).join('');
  }
}

function selectStore(category, storeId) {
  store = STORES[category].find(s => s.id === storeId);
  render();
}

function renderCoupon(c) {
  let social = '<a href="#" class="social-link"><i class="fab fa-facebook"></i></a><a href="#" class="social-link"><i class="fab fa-twitter"></i></a>';
  return `
    <div class="coupon-card">
      <div class="card-image-container">${c.emoji || '🎁'}</div>
      <div class="discount-badge">${c.disc}</div>
      <div class="card-content">
        <h3 class="card-title">${store.name}</h3>
        <p style="font-size:0.85rem; color:#555; margin-bottom:1rem;">${c.desc}</p>
        <div class="code-badge" onclick="openModal('${c.code}')"><code>••••••••</code></div>
        <a class="btn-deal" href="${c.link}" target="_blank">Shop</a>
        <div class="social-share">${social}</div>
      </div>
    </div>
  `;
}

function openModal(code) {
  coupon = code;
  document.getElementById('emailForm').style.display = 'block';
  document.getElementById('couponReveal').classList.remove('show');
  document.getElementById('emailInput').value = '';
  document.getElementById('emailModal').classList.add('active');
}

function handleEmailSubmit(e) {
  e.preventDefault();
  const email = document.getElementById('emailInput').value;
  const fd = new FormData();
  fd.append('Timestamp', new Date());
  fd.append('Email', email);
  fd.append('Coupon', coupon);
  fetch('https://docs.google.com/forms/d/e/1FAIpQLSdWxUHsSaurWmbjlUEmLpWyFijcSUJPKjTKPzFjVV61p9c2pA/formResponse', { method: 'POST', body: fd, mode: 'no-cors' });
  
  if (store && store.coupons.find(c => c.code === coupon)?.partner) {
    setTimeout(() => { window.location.href = store.coupons.find(c => c.code === coupon).link; }, 300);
  } else {
    document.getElementById('emailForm').style.display = 'none';
    document.getElementById('couponCode').textContent = coupon;
    document.getElementById('couponReveal').classList.add('show');
  }
}

function copyCoupon() { navigator.clipboard.writeText(coupon); alert('Copied!'); }
function doSearch() {}

document.getElementById('emailModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('emailModal')) document.getElementById('emailModal').classList.remove('active');
});

changeLanguage('en');
</script>

</body>
</html>
